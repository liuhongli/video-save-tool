<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>视频保存工具</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div>
          <p class="eyebrow">Video Save Tool</p>
          <h1>粘贴公开视频链接，保存视频文件</h1>
          <p class="subtle">适合保存你有权下载或平台允许下载的公开视频。请勿用于搬运、侵权或绕过作者限制。本工具不保存视频在服务器，产生法律纠纷概不负责。</p>
        </div>

        <form class="form" id="downloadForm">
          <label for="url">视频分享链接</label>
          <textarea
            id="url"
            name="url"
            rows="4"
            placeholder="https://v.***.com/..."
            required
          ></textarea>
          <button id="submitButton" type="submit">保存</button>
        </form>

        <section class="status" id="statusPanel" hidden>
          <div class="status-row">
            <span id="statusText">准备下载</span>
            <strong id="percentText">0%</strong>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </section>

        <section class="preview" id="previewPanel" hidden>
          <video id="videoPreview" controls playsinline></video>
          <a class="save-link" id="saveLink" href="#" download>保存到本地</a>
          <p class="hint">手机浏览器会打开系统保存菜单；如需保存到相册，请在视频打开后使用分享菜单保存。</p>
        </section>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
