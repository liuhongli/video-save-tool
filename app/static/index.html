<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>视频保存工具</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260616-1" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div>
          <p class="eyebrow">Video Save Tool</p>
          <h1>粘贴公开视频链接，保存视频文件</h1>
          <p class="subtle">适合保存你有权下载或平台允许下载的公开视频。请勿用于搬运、侵权或绕过作者限制。本工具不保存视频在服务器，产生法律纠纷概不负责。</p>
        </div>

        <form class="form" id="downloadForm">
          <label for="url">视频分享链接</label>
          <textarea
            id="url"
            name="url"
            rows="4"
            placeholder="https://v.***.com/..."
            required
          ></textarea>
          <button id="submitButton" type="submit">保存</button>
        </form>

        <section class="status" id="statusPanel" hidden>
          <div class="status-row">
            <span id="statusText">准备下载</span>
            <strong id="percentText">0%</strong>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </section>

        <section class="preview" id="previewPanel" hidden>
          <video id="videoPreview" controls playsinline></video>
          <button class="save-button" id="saveToAlbumButton" type="button">打开视频原文件保存</button>
          <a class="open-link" id="openVideoLink" href="#" target="_blank" rel="noopener">打开视频原文件</a>
          <p class="hint" id="saveHint">点击保存会打开视频原文件页面；打开后点 Safari 分享按钮，再选择“保存视频”。</p>
        </section>
      </section>
    </main>
    <script src="/static/app.js?v=20260616-1"></script>
  </body>
</html>
