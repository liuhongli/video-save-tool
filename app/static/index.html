<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>视频保存工具</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div>
          <p class="eyebrow">Video Save Tool</p>
          <h1>粘贴公开视频链接，保存视频文件</h1>
          <p class="subtle">适合保存你有权下载或平台允许下载的公开视频。请勿用于搬运、侵权或绕过作者限制。</p>
        </div>

        <form class="form" action="/download" method="post">
          <label for="url">视频分享链接</label>
          <textarea
            id="url"
            name="url"
            rows="4"
            placeholder="https://v.douyin.com/..."
            required
          ></textarea>
          <button type="submit">下载视频</button>
        </form>
      </section>
    </main>
  </body>
</html>
